name: Release

on:
  push:
    tags:
      - "v*.*"   # triggers on tags like v1.8, v2.0, etc.

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Extract version from the tag (strips the leading "v") ──────
      - name: Parse version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # ── Stamp the version tuple inside bl_info ─────────────────────
      # Converts tag v1.8 → "version": (1, 8) inside the .py file
      - name: Update bl_info version
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          sed -i "s/\"version\": ([0-9]*, [0-9]*)/\"version\": ($MAJOR, $MINOR)/" Texture_Swap_V4.py

      # ── Rename the file to include the version number ──────────────
      - name: Rename addon file
        run: |
          cp Texture_Swap_V4.py "Texture_Swap_v${{ steps.version.outputs.VERSION }}.py"

      # ── Build a changelog snippet from commits since last tag ──────
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s" HEAD)
          else
            LOG=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD")
          fi
          # Write to file so multi-line content passes through cleanly
          echo "$LOG" > changelog.txt
          echo "Changelog:"
          cat changelog.txt

      # ── Prepend quickstart to the changelog ───────────────────────
      - name: Build release body
        run: |
          cat > release_body.txt << 'EOF'
          ## Quickstart

          1. Download `Texture_Swap_v${{ steps.version.outputs.VERSION }}.py` below
          2. In Blender: **Edit → Preferences → Add-ons → Install** → select the file → enable it
          3. Press `N` in the 3D Viewport and open the **Texture Swap** tab
          4. Click **Add Mesh Slot** → pick your mesh and material
          5. Click **Add Node** → enter your Image Texture node's label and point it at a folder of images
          6. Set **Frames per Swap** and **Start Frame**, then hit **Apply Texture Swap**
          7. Scrub or play the timeline — your textures will swap automatically

          **Tip:** Set a label on a node in the Shader Editor by pressing `F2` or double-clicking the node header. You can use that label directly in the addon instead of the internal node name.
          ---

          ## Changes
          EOF
          cat changelog.txt >> release_body.txt

      # ── Create the GitHub Release and attach the .py file ──────────
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          tag_name: ${{ github.ref_name }}
          body_path: release_body.txt
          files: |
            Texture_Swap_v${{ steps.version.outputs.VERSION }}.py
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}