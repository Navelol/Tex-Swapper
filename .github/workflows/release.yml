name: Release

on:
  push:
    tags:
      - "v*.*"   # triggers on tags like v1.8, v2.0, etc.

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Extract version from the tag (strips the leading "v") ──────
      - name: Parse version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # ── Stamp the version tuple inside bl_info ─────────────────────
      # Converts tag v1.8 → "version": (1, 8) inside the .py file
      - name: Update bl_info version
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          sed -i "s/\"version\": ([0-9]*, [0-9]*)/\"version\": ($MAJOR, $MINOR)/" Texture_Swap_V4.py

      # ── Rename the file to include the version number ──────────────
      - name: Rename addon file
        run: |
          cp Texture_Swap_V4.py "Texture_Swap_v${{ steps.version.outputs.VERSION }}.py"

      # ── Build a changelog snippet from commits since last tag ──────
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s" HEAD)
          else
            LOG=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD")
          fi
          # Write to file so multi-line content passes through cleanly
          echo "$LOG" > changelog.txt
          echo "Changelog:"
          cat changelog.txt

      # ── Create the GitHub Release and attach the .py file ──────────
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          tag_name: ${{ github.ref_name }}
          body_path: changelog.txt
          files: |
            Texture_Swap_v${{ steps.version.outputs.VERSION }}.py
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
